name: Deploy to Cluster

on:
  workflow_run:
    workflows: ["Publish GHCR Image"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out deploy repo
        uses: actions/checkout@v4
        with:
          repository: Ansvar-Systems/deploy
          ref: main
          path: deploy-repo
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render Helm chart (public)
        if: ${{ vars.DEPLOY_PRIVATE != 'true' }}
        run: |
          mkdir -p deploy-repo/service/swedish-data-protection-mcp
          helm template swedish-data-protection-mcp chart/ \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --namespace swedish-data-protection-mcp \
            > deploy-repo/service/swedish-data-protection-mcp/deploy.yaml

      - name: Render Helm chart (private)
        if: ${{ vars.DEPLOY_PRIVATE == 'true' }}
        run: |
          mkdir -p deploy-repo/service/swedish-data-protection-mcp
          printf 'dockerConfigJson: "%s"\n' "${{ secrets.GHCR_DOCKER_CONFIG }}" > /tmp/private-values.yaml
          helm template swedish-data-protection-mcp chart/ \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set private=true \
            -f /tmp/private-values.yaml \
            --namespace swedish-data-protection-mcp \
            > deploy-repo/service/swedish-data-protection-mcp/deploy.yaml
          rm /tmp/private-values.yaml

      - name: Commit and push
        env:
          CI_COMMIT_MESSAGE: "chore: update swedish-data-protection-mcp to ${{ steps.tag.outputs.tag }}"
        run: |
          cd deploy-repo
          git config user.name "Continuous Integration"
          git config user.email "ci@ansvar.eu"
          git add service/swedish-data-protection-mcp/deploy.yaml
          git diff --staged --quiet || git commit -m "${{ env.CI_COMMIT_MESSAGE }}"
          git push

      - name: Send Slack notification
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "swedish-data-protection-mcp deployed ${{ steps.tag.outputs.tag }} — ${{ job.status }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
